.top-bar h1{font-size:19px;font-weight:700;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.top-bar h1 span{font-size:12px;font-weight:400;color:var(--text2);margin-left:8px}
.nav-link{padding:6px 14px;border-radius:16px;font-size:12px;font-weight:500;border:1px solid rgba(255,255,255,.08);color:var(--text2);text-decoration:none;transition:all .2s;cursor:pointer}
.nav-link:hover{border-color:var(--accent);color:var(--accent);text-decoration:none}

.container{padding:20px 24px 60px;max-width:1400px;margin:0 auto}

.legend{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:16px;padding:12px 16px;background:var(--bg2);border-radius:var(--radius);border:1px solid rgba(255,255,255,.04);font-size:12px;color:var(--text2);align-items:center}
.legend-item{display:flex;align-items:center;gap:6px}
.legend-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}

.stats{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px}
.stat-card{padding:10px 16px;background:var(--bg2);border:1px solid rgba(255,255,255,.06);border-radius:var(--radius);font-size:12px;color:var(--text2);display:flex;align-items:center;gap:8px}

table{width:100%;border-collapse:collapse;font-size:12px;background:var(--bg2);border-radius:var(--radius);overflow:hidden;border:1px solid rgba(255,255,255,.06)}

tbody td{padding:8px 12px;border-bottom:1px solid rgba(255,255,255,.03);vertical-align:middle}
tbody tr:hover{background:rgba(255,255,255,.02)}

.cat-header td{background:var(--bg3);font-weight:700;font-size:13px;color:var(--accent2);padding:10px 12px;border-bottom:1px solid rgba(108,92,231,.2)}

.td-no{text-align:center;font-family:'JetBrains Mono',monospace;font-weight:500;color:var(--text3);width:40px}
.td-major{font-weight:600;color:var(--accent2);width:130px}
.td-task{font-weight:500;width:180px}
.td-ace{width:160px}
.td-rr{font-size:11px;color:var(--text2);width:120px}
.td-desc{font-size:11px;color:var(--text2);line-height:1.5}

function toast(m){var t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(function(){t.classList.remove('show')},2000)}

function setFilter(f,el){
  currentFilter=f;
  document.querySelectorAll('.filter-btn').forEach(function(b){b.classList.remove('active')});
  if(el) el.classList.add('active');
  renderTable();

function getAce(no){return aceOverrides[no]||null}
function setAce(no,val){
  aceOverrides[no]=val;

  renderTable();
  toast('ACE 구분 변경됨');
}

function findWfMatches(item){
  var cat=item.major||'';
  var task=item.task;
  var matches=[];
  // 대분류 기반 카테고리 결정
  var parentCat=cat||midToMajor[task]||'';
  workflows.forEach(function(w){
    var wMajor=w.major||w.category||'';
    var wMid=w.mid||'';
    // 중분류 매칭
    if(wMid && wMid===task){
      matches.push(w);
    }
    // 대분류만 매칭 (중분류 없는 경우)
    else if(!wMid && wMajor===parentCat){
      matches.push(w);
    }
  });
  return matches;
}

function aceLabel(ace){
  if(ace==='A') return '<span class="ace-a">A · Automatic</span>';
  if(ace==='C') return '<span class="ace-c">C · Collaborate</span>';
  if(ace==='E') return '<span class="ace-e">E · Execute</span>';
  return ace;
}

    cat.items.forEach(function(item){
      total++;
      var ace=getAce(item.no)||item.ace;
      if(ace==='A') cntA++;
      if(ace==='C') cntC++;
      if(ace==='E') cntE++;
      if(findWfMatches(item).length>0) cntWf++;
    });
  });
  document.getElementById('statsBar').innerHTML=
    '<div class="stat-card"><span class="num" style="color:var(--text)">'+total+'</span> 전체 업무</div>'+
    '<div class="stat-card"><span class="num" style="color:var(--green)">'+cntA+'</span> Automatic</div>'+
    '<div class="stat-card"><span class="num" style="color:var(--amber)">'+cntC+'</span> Collaborate</div>'+
    '<div class="stat-card"><span class="num" style="color:var(--coral)">'+cntE+'</span> Execute</div>'+
    '<div class="stat-card"><span class="num" style="color:var(--accent2)">'+cntWf+'</span> 워크플로우 등록</div>';
}

function renderTable(){
  var html='';
  DATA.forEach(function(cat){
    var catItems=cat.items.filter(function(item){
      var ace=getAce(item.no)||item.ace;
      if(currentFilter==='A' && ace!=='A') return false;
      if(currentFilter==='C' && ace!=='C') return false;
      if(currentFilter==='E' && ace!=='E') return false;
      if(currentFilter==='wf' && findWfMatches(item).length===0) return false;
      return true;
    });
    if(catItems.length===0) return;

    html+='<tr class="cat-header"><td colspan="7">'+cat.cat+'</td></tr>';
    catItems.forEach(function(item){
      var ace=getAce(item.no)||item.ace;
      var matches=findWfMatches(item);
      var wfHtml='';
      if(matches.length>0){
        matches.forEach(function(w){
          wfHtml+='<span class="wf-badge">📊 '+w.name+' <span class="wf-author">by '+(w.author||'미지정')+'</span></span>';
        });
      } else {
        wfHtml='<span style="color:var(--text3);font-size:10px">—</span>';
      }

      var aceColor=ace==='A'?'var(--green)':ace==='C'?'var(--amber)':'var(--coral)';
      var rowBorder='border-left:3px solid '+aceColor;

      html+='<tr style="'+rowBorder+'">';
      html+='<td class="td-no">'+item.no+'</td>';
      html+='<td class="td-major">'+item.major+'</td>';
      html+='<td class="td-task">'+item.task+'</td>';
      html+='<td class="td-ace"><select class="ace-select" onchange="setAce('+item.no+',this.value)" style="color:'+aceColor+'">';
      html+='<option value="A" '+(ace==='A'?'selected':'')+' style="color:var(--green)">A · Automatic (자동화)</option>';
      html+='<option value="C" '+(ace==='C'?'selected':'')+' style="color:var(--amber)">C · Collaborate (반자동화)</option>';
      html+='<option value="E" '+(ace==='E'?'selected':'')+' style="color:var(--coral)">E · Execute (인간전담)</option>';
      html+='</select></td>';
      html+='<td class="td-rr">'+item.rr+'</td>';
      html+='<td class="td-desc">'+item.desc+'</td>';
      html+='<td class="td-wf">'+wfHtml+'</td>';
      html+='</tr>';
    });
  });
  document.getElementById('tableBody').innerHTML=html;
  renderStats();
}

/* ===== INIT ===== */
(async function(){
  // ACE 오버라이드 로드
  try{aceOverrides=JSON.parse(localStorage.getItem('ace_overrides')||'{}')}catch(e){aceOverrides={}}
  // 워크플로우 데이터 로드
  workflows=await sharedLoad('wf_data',[]);
  sharedOnSync('wf_data',function(data){if(Array.isArray(data)){workflows=data;renderTable()}});
  renderTable();
})();
</script>
